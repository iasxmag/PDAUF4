<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Mis Partidos Asignados</h1>
  </div>
  <hr>

  <div *ngIf="misPartidos.length === 0" class="alert alert-warning">
    <p class="me-2"></p> No tienes partidos asignados todavía.
  </div>

  <div *ngIf="misPartidos.length > 0" class="table-responsive">
    <table class="table table-striped table-hover border">
      <thead class="table-warning">
        <tr>
          <th>Deporte</th>
          <th>Local</th>
          <th>Visitante</th>
          <th>Fecha</th>
          <th>Ubicación</th>
        </tr>
      </thead>
      <tbody>
        <!-- Mostrar los partidos asignados al árbitro -->
        <tr *ngFor="let p of misPartidos">
          <td><span class="badge bg-primary">{{ p.deporte }}</span></td>
          <td><strong>{{ p.equipoLocal }}</strong></td>
          <td><strong>{{ p.equipoVisitante }}</strong></td>
          <td>{{ p.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
          <td>{{ p.ubicacion }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
