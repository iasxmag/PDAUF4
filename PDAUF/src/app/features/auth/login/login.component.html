<div class="container mt-5 pt-5 " style="max-width: 400px;">
  <h2 class="text-center mb-4">Inicio de sesión</h2>

  <form (ngSubmit)="onLogin()">
    <div class="mb-3">
      <label class="form-label">Usuario:</label>
      <input type="text" class="form-control" [(ngModel)]="usuario" name="usuario" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña:</label>
      <input type="password" class="form-control" [(ngModel)]="contrasena" name="password" required>
    </div>

    <button class="btn btn-danger w-100" type="submit">Entrar</button>
  </form>

  <p class="text-center mt-3">
    ¿No tienes cuenta?
    <a routerLink="/register">Regístrate aquí</a>
  </p>
</div>
