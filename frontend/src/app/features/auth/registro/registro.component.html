<div class="container mt-5 pt-5 mb-5 " style="max-width: 400px;">
  <h1 class="text-center mb-4">Registro</h1>

  <form (ngSubmit)="onRegister()">
    <div class="mb-3">
      <label class="form-label">Usuario:</label>
      <input type="text" class="form-control" [(ngModel)]="usuario" name="usuario" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña:</label>
      <input type="password" class="form-control" [(ngModel)]="contrasena" name="password" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Tipo de usuario:</label>
      <select class="form-select" [(ngModel)]="tipo" name="tipo" required>
        <option value="normal">Usuario</option>
        <option value="admin">Administrador</option>
        <option value="arbitro">Árbitro</option>
        <option value="capitan">Capitán</option>
      </select>
    </div>

    <div class="mb-3">
      <label>Equipo (solo jugadores y capitanes)</label>
      <input type="text" [(ngModel)]="equipo" name="equipo" class="form-control" placeholder="Equipo">
    </div>
<button class="btn btn-danger w-100" type="submit">Registrarse</button>
</form>
</div>
